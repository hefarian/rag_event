version: '3.9'

services:
  # Service API FastAPI
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: puls-events-api
    ports:
      - "8000:8000"
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - OPENAGENDA_API_KEY=${OPENAGENDA_API_KEY:-}
      - PYTHONUNBUFFERED=1
    volumes:
      # Monter les répertoires pour développement/production
      - ./vectors:/app/vectors
      - ./data:/app/data
      - ./DATAIN:/app/DATAIN
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - puls-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Service Interface Streamlit
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: puls-events-ui
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - PYTHONUNBUFFERED=1
    depends_on:
      api:
        condition: service_healthy
    volumes:
      # Cache Streamlit pour améliorer les performances
      - streamlit-cache:/root/.streamlit
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - puls-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  puls-network:
    driver: bridge

volumes:
  streamlit-cache:
    driver: local
