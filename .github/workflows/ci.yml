name: Tests CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    name: Python Syntax Check
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Check Python syntax (all files)
      run: |
        echo "🔍 Checking syntax for all Python files..."
        python -m py_compile init_index.py streamlit_app.py
        python -m py_compile api/*.py
        python -m py_compile scripts/*.py
        python -m py_compile tests/*.py
        echo "✅ All files have valid Python syntax"

  test:
    runs-on: ubuntu-latest
    needs: syntax-check
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Run pytest tests
      run: |
        echo "🧪 Running pytest tests..."
        pytest tests/ -v --cov=api --cov=scripts --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    needs: syntax-check
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pylint
    
    - name: Lint Python files (critical errors only)
      run: |
        echo "🔍 Checking critical errors (E9, F63, F7, F82)..."
        flake8 api/ scripts/ init_index.py streamlit_app.py \
          --count --select=E9,F63,F7,F82 --show-source --statistics
        echo "✅ No critical syntax errors found"
    
    - name: Lint Python files (all warnings)
      run: |
        echo "⚠️  Checking code quality (warnings)..."
        flake8 api/ scripts/ init_index.py streamlit_app.py \
          --count --exit-zero --max-complexity=10 --max-line-length=127 \
          --statistics --exclude=__pycache__
      continue-on-error: true
    
    - name: Lint with pylint (api module)
      run: |
        echo "🔍 Running pylint on api module..."
        pylint api/*.py --disable=all --enable=E,F --exit-zero
      continue-on-error: true
